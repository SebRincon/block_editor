name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze / Format / Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: dart pub get

      - name: Verify dart format
        run: melos run format

      - name: Run dart analyze
        run: melos run analyze

      - name: Run tests
        run: melos run test

      - name: Print package versions
        run: |
          echo "block_editor: $(grep '^version:' packages/block_editor/pubspec.yaml | awk '{print $2}')"
          echo "block_editor_plugins: $(grep '^version:' packages/block_editor_plugins/pubspec.yaml | awk '{print $2}')"

  platform-builds:
    name: Build Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: dart pub get

      - name: Build example app (Android)
        if: matrix.os == 'ubuntu-latest'
        working-directory: example
        run: flutter build apk --debug

      - name: Build example app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: example
        run: flutter build macos --debug

      - name: Build example app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: example
        run: flutter build windows --debug

      - name: Build example app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: example
        run: flutter build linux --debug

      - name: Build example app (Web)
        if: matrix.os == 'ubuntu-latest'
        working-directory: example
        run: flutter build web

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: dart pub get

      - name: Validate publishability (dry run)
        run: melos run publish:dry-run

  deploy-web-demo:
    name: Deploy Web Demo to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: dart pub get

      - name: Build web demo
        working-directory: example
        run: flutter build web --release --base-href /block_editor/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4