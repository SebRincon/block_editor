name: block_editor_workspace

packages:
  - packages/*
  - example

command:
  version:
    conventional_commits: true
    update_changelog: true
    update_git_tag_refs: true
    workspaceChangelog: true
    branch: main
    message: "chore(release): publish packages\n\n{new_package_versions}"

  publish:
    git_tag_version: true

scripts:
  analyze:
    run: melos exec --concurrency=1 -- dart analyze --fatal-infos .
    description: Run dart analyze across all packages with zero-warning policy.

  format:
    run: >
      melos exec --concurrency=1 --
      dart format --output=none --set-exit-if-changed .
    description: Verify dart format compliance across all packages. Fails on any unformatted file.

  format:fix:
    run: melos exec --concurrency=1 -- dart format .
    description: Auto-format all files across all packages.

  test:
    run: >
      melos exec --concurrency=1 --fail-fast --
      flutter test --coverage
    description: Run the full test suite with coverage collection across all packages.

  test:unit:
    run: >
      melos exec --concurrency=1 --fail-fast
      --dir-exists=test --
      flutter test test/unit
    description: Run only unit tests across all packages.

  publish:dry-run:
    run: >
      melos exec --concurrency=1 --
      dart pub publish --dry-run
    description: Validate all packages are publishable without actually publishing.

  deps:
    run: melos exec --concurrency=4 -- flutter pub get
    description: Run flutter pub get across all packages and the example app.

  deps:upgrade:
    run: melos exec --concurrency=1 -- flutter pub upgrade
    description: Upgrade dependencies to their latest compatible versions across all packages.

  clean:
    run: melos exec --concurrency=4 -- flutter clean
    description: Run flutter clean across all packages and the example app.

  lint:
    run: melos run analyze && melos run format
    description: Run both analyzer and format checks. Used as the single lint gate in CI.